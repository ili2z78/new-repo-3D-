<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Labyrinth 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="start-screen">
        <div class="menu-content">
            <h1>NEON <span class="accent">LABYRINTH</span></h1>
            
            <div class="menu-grid">
                <div class="controls-group">
                    <label for="maze-size">CONFIGURATION DU RÉSEAU</label>
                    <select id="maze-size">
                        <option value="11">DÉBUTANT (11x11)</option>
                        <option value="21" selected>INTERMÉDIAIRE (21x21)</option>
                        <option value="31">EXPERT (31x31)</option>
                        <option value="51">HACKER (51x51)</option>
                    </select>
                </div>

                <div class="character-selection">
                    <h3>SÉLECTION DE L'AVATAR</h3>
                    <div class="avatar-list">
                        <div class="avatar-option selected" data-type="ROBOT">
                            <div class="avatar-icon robot"></div>
                            <span>ROBOT</span>
                        </div>
                        <div class="avatar-option" data-type="SPIKE">
                            <div class="avatar-icon spike"></div>
                            <span>SPIKE</span>
                        </div>
                        <div class="avatar-option" data-type="ORB">
                            <div class="avatar-icon orb"></div>
                            <span>ORB</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-actions">
                <button id="btn-solo" class="btn-primary">DÉMARRER LA SÉQUENCE</button>
                <button id="btn-multi" class="btn-secondary">COOPÉRATION LOCALE</button>
            </div>
        </div>
    </div>
    <div id="ui" style="display: none;">
        <div id="navbar">
            <div class="nav-left">
                <div class="logo-mini">NEON <span class="accent">LAB</span></div>
                <div id="timer">00:00</div>
            </div>
            <div class="nav-center">
                <div id="instructions">WASD: BOUGER | C: VUE | R: RESET</div>
            </div>
            <div class="nav-right">
                <button id="btn-restart" class="btn-icon" title="Recommencer">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                <button id="btn-home" class="btn-danger">QUITTER</button>
            </div>
        </div>
    </div>
    <div id="container">
        <!-- Canvas will be added by Three.js -->
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
