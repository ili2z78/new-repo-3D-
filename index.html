<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Labyrinth 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="start-screen">
        <h1>NEON LABYRINTH</h1>
        <div class="controls-group">
            <label for="maze-size">TAILLE DU LABYRINTHE:</label>
            <select id="maze-size">
                <option value="11">11 x 11</option>
                <option value="21" selected>21 x 21</option>
                <option value="31">31 x 31</option>
                <option value="51">51 x 51</option>
            </select>
        </div>
        <button id="btn-solo">DÉMARRER SOLO</button>
        <button id="btn-multi">MULTIJOUEUR LOCAL</button>
    </div>
    <div id="ui" style="display: none;">
        <div id="timer">Temps: 0s</div>
        <div id="instructions">ZQSD/WASD: Se déplacer | Flèches: Tourner | C: Caméra | R: Reset</div>
    </div>
    <div id="container">
        <!-- Canvas will be added by Three.js -->
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
